<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="1400" height="920" viewBox="0 0 1400 920" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <style>
            .title{font:700 22px Arial, sans-serif; fill:#0d47a1}
            .subtitle{font:700 16px Arial, sans-serif; fill:#263238}
            .text{font:14px Arial, sans-serif; fill:#263238}
            .small{font:12px Arial, sans-serif; fill:#455a64}
            .box{stroke:#263238; stroke-width:1.5; rx:8; ry:8}
            .ui{fill:#e3f2fd}
            .bloc{fill:#e8f5e9}
            .domain{fill:#fff8e1}
            .data{fill:#f3e5f5}
            .infra{fill:#fff3e0}
            .ux{fill:#fce4ec}
            .legend{fill:#fafafa; stroke:#cfd8dc; stroke-width:1; rx:8; ry:8}
            .arrow{stroke:#455a64; stroke-width:1.5; marker-end:url(#mEnd)}
            .dashed{stroke-dasharray:5,5}
            .cap{stroke:#90a4ae; stroke-width:1}
        </style>
        <marker id="mEnd" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#455a64"/>
        </marker>
    </defs>

    <!-- Title -->
    <text x="30" y="42" class="title">Flutter ML App — Architecture (Flutter + BLoC + ML Kit)</text>
    <text x="30" y="68" class="small">Inputs: Live Camera, Gallery, Capture, Microphone • Features: Labeling, Barcode, Face, Object, OCR, Pose, Smart Reply, Chat, Entity Extraction, Digital Ink, Translation</text>

    <!-- UI Layer -->
    <rect x="20" y="90" width="420" height="240" class="box ui"/>
    <text x="30" y="115" class="subtitle">Presentation Layer (Screens/Widgets)</text>
    <text x="40" y="145" class="text">• Home _ Navigation</text>
    <text x="40" y="170" class="text">• Image Labeling UI</text>
    <text x="40" y="195" class="text">• Barcode Scanner UI</text>
    <text x="40" y="220" class="text">• Face / Object / OCR / Pose UIs</text>
    <text x="40" y="245" class="text">• Smart Reply / Chat UI</text>
    <text x="40" y="270" class="text">• Entity / Digital Ink / Translation UIs</text>

    <!-- BLoC Layer -->
    <rect x="480" y="90" width="420" height="240" class="box bloc"/>
    <text x="490" y="115" class="subtitle">BLoC / Cubit (State Management)</text>
    <text x="500" y="145" class="text">• One BLoC per feature (e.g., ImageLabelingBloc, BarcodeBloc)</text>
    <text x="500" y="170" class="text">• Consistent Loading / Error / Success states</text>
    <text x="500" y="195" class="text">• Event-driven updates, minimal rebuilds</text>
    <text x="500" y="220" class="text">• Reusable base states _ mappers</text>

    <!-- Domain Layer -->
    <rect x="940" y="90" width="440" height="240" class="box domain"/>
    <text x="950" y="115" class="subtitle">Use Cases (Domain)</text>
    <text x="960" y="145" class="text">• LabelImage, ScanBarcode, DetectFaces, DetectObjects, RecognizeText</text>
    <text x="960" y="170" class="text">• EstimatePose, GenerateSmartReplies, ChatSmartReplies</text>
    <text x="960" y="195" class="text">• ExtractEntities, RecognizeInk, TranslateText</text>
    <text x="960" y="220" class="text">• Encapsulate business rules and orchestration</text>

    <!-- Data Layer -->
    <rect x="20" y="360" width="420" height="220" class="box data"/>
    <text x="30" y="385" class="subtitle">Repositories (Data Access)</text>
    <text x="40" y="415" class="text">• MediaRepository (camera, picker, frames)</text>
    <text x="40" y="440" class="text">• VisionRepository (label, barcode, face, object, text, pose)</text>
    <text x="40" y="465" class="text">• NLPRepository (smart reply, entity, digital ink)</text>
    <text x="40" y="490" class="text">• TranslationRepository (auto-detect + translate)</text>
    <text x="40" y="515" class="text">• Centralized error mapping _ caching hooks</text>

    <!-- Infra Layer -->
    <rect x="480" y="360" width="900" height="220" class="box infra"/>
    <text x="490" y="385" class="subtitle">Services / Adapters</text>

    <!-- IO Pipeline -->
    <rect x="500" y="410" width="360" height="150" class="box" fill="#fff"/>
    <text x="510" y="435" class="text">Unified Input Pipeline</text>
    <text x="520" y="460" class="small">• Camera Service (live frames)</text>
    <text x="520" y="480" class="small">• Gallery / Camera Picker</text>
    <text x="520" y="500" class="small">• Mic → Speech-to-Text (optional)</text>
    <text x="520" y="520" class="small">• Preprocessing (resize, rotation, formats)</text>

    <!-- ML Kit -->
    <rect x="880" y="410" width="480" height="150" class="box" fill="#fff"/>
    <text x="890" y="435" class="text">On-Device ML (ML Kit / TFLite)</text>
    <text x="900" y="460" class="small">• Image Labeler, Barcode, Face, Object, Text (OCR), Pose</text>
    <text x="900" y="480" class="small">• Smart Reply, Entity Extraction, Digital Ink</text>
    <text x="900" y="500" class="small">• Translator (auto-detect + target languages)</text>

    <!-- Cross-cutting -->
    <rect x="1370" y="360" width="0" height="0" fill="none" stroke="none"/>
    <rect x="500" y="575" width="860" height="40" class="legend"/>
    <text x="510" y="600" class="small">Cross-cutting: Cache / Model Manager • Permissions • Logging/Analytics • Error Mapper</text>

    <!-- UX Output -->
    <rect x="20" y="620" width="1360" height="220" class="box ux"/>
    <text x="30" y="645" class="subtitle">Render _ Output</text>
    <text x="40" y="675" class="text">• Overlays: bounding boxes, keypoints, labels</text>
    <text x="40" y="700" class="text">• Text outputs: OCR blocks, entities, smart replies, translations</text>
    <text x="40" y="725" class="text">• Actions: copy / share / save / retry</text>
    <text x="40" y="750" class="text">• Accessibility: high contrast, large tap targets</text>

    <!-- Arrows: UI -> BLoC -> Domain -> Data -> Services -> ML -->
    <line x1="440" y1="210" x2="480" y2="210" class="arrow"/>
    <line x1="900" y1="210" x2="940" y2="210" class="arrow"/>
    <line x1="460" y1="470" x2="480" y2="470" class="arrow"/>
    <line x1="380" y1="470" x2="20" y2="470" class="cap"/>
    <line x1="840" y1="485" x2="880" y2="485" class="arrow"/>

    <!-- Domain -> Data -->
    <line x1="940" y1="250" x2="440" y2="390" class="arrow dashed"/>
    <line x1="940" y1="250" x2="480" y2="390" class="arrow dashed"/>

    <!-- Data -> IO Pipeline & ML -->
    <line x1="440" y1="470" x2="500" y2="470" class="arrow"/>
    <line x1="440" y1="490" x2="880" y2="490" class="arrow"/>

    <!-- Services back to Repos (bidirectional) -->
    <line x1="860" y1="560" x2="440" y2="520" class="arrow dashed"/>

    <!-- Outputs to UX -->
    <line x1="730" y1="600" x2="730" y2="620" class="arrow"/>
    <line x1="230" y1="330" x2="230" y2="620" class="arrow dashed"/>

    <!-- Legend -->
    <rect x="1020" y="20" width="360" height="40" class="legend"/>
    <rect x="1030" y="28" width="18" height="12" class="box ui"/><text x="1055" y="38" class="small">UI</text>
    <rect x="1095" y="28" width="18" height="12" class="box bloc"/><text x="1120" y="38" class="small">BLoC</text>
    <rect x="1160" y="28" width="18" height="12" class="box domain"/><text x="1185" y="38" class="small">Domain</text>
    <rect x="1235" y="28" width="18" height="12" class="box data"/><text x="1260" y="38" class="small">Data</text>
    <rect x="1295" y="28" width="18" height="12" class="box infra"/><text x="1320" y="38" class="small">Services</text>
    <rect x="1360" y="28" width="18" height="12" class="box ux"/><text x="1385" y="38" class="small">UX</text>
</svg>
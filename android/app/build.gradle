plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace = "com.example.flutter_ai_ml"
    compileSdk = 36
    ndkVersion = '27.0.12077973'

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_17
    }

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId = "com.example.flutter_ai_ml"
        // You can update the following values to match your application needs.
        // For more information, see: https://flutter.dev/to/review-gradle-config.
        minSdk = flutter.minSdkVersion
        targetSdk = 36
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    buildTypes {
        release {
            // TODO: Add your own signing config for the release build.
            // Signing with the debug keys for now, so `flutter run --release` works.
            signingConfig = signingConfigs.debug
        }
    }
    // Add the following to your app's build.gradle file to ensure Gradle doesn't compress the model file when building the app
    aaptOptions {
        noCompress "tflite"
        // or noCompress "lite"
    }
    dependencies {
        // Add language package you need to use
        implementation 'com.google.mlkit:text-recognition-chinese:16.0.1'
        implementation 'com.google.mlkit:text-recognition-devanagari:16.0.1'
        implementation 'com.google.mlkit:text-recognition-japanese:16.0.1'
        implementation 'com.google.mlkit:text-recognition-korean:16.0.1'
    }
}

flutter {
    source = "../.."
}
